name: basis-lock-bot

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace zavislosti
        run: pip install -r requirements.txt

      - name: Beh bota
        run: python bot.py | tee -a bot_log.txt

      - name: Ulozeni stavu
        run: |
          git config user.name basis-lock-bot
          git config user.email bot@users.noreply.github.com
          git add basis_lock.db bot_log.txt
          git diff --cached --quiet || git commit -m bot-run
          git push
